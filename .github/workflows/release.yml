name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update when running manually.
        required: true
        default: v0.0.0

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk tshell-android.apk

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: tshell-android.apk
          if-no-files-found: error

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build release executable
        run: flutter build windows --release

      - name: Prepare Windows release assets
        shell: pwsh
        run: |
          Copy-Item build/windows/x64/runner/Release/tshell.exe tshell-windows-x64.exe
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath tshell-windows-x64.zip -Force

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            tshell-windows-x64.exe
            tshell-windows-x64.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-windows
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
          files: release-assets/*
          generate_release_notes: true
